<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pumper Driver/Operator</title>
	<link rel="manifest" href="../manifest.json">
	<meta name="theme-color" content="#2c3e50">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Practice Tests">
	<link rel="apple-touch-icon" href="../appstore-images/ios/180.png">
	<link rel="stylesheet" href="../style.css">
	<script src="../pwa-register.js" defer></script>
</head>
<body>
	<header class="page-header">
		<div class="maltese-cross header-cross"></div>
		<h1>Pumper Driver/Operator</h1>
		<p class="header-subtitle">Choose a test version or the practice builder.</p>
	</header>

		<a class="button-link" href="../index.html">Home</a>
		<a class="button-link" href="practice_pdo.html">Practice Builder</a>
		<div style="max-width: 200px; margin: 0.25rem auto 0; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
			<select id="typeSelect" style="width: 200px; padding: 0.85rem 1.35rem; font-size: 1rem; border-radius: 5px; border: 1px solid #222; appearance: none; background: #2c3e50; color: #fff; box-shadow: 0 2px 8px rgba(44,62,80,0.10); text-align: center;">
				<option value="">-- Select --</option>
				<option value="test">Tests</option>
				<option value="quiz">Quizzes</option>
			</select>
			<div id="customChapterDropdown" style="width: 200px; position: relative;">
				<button id="chapterDropdownButton" style="width: 100%; padding: 0.85rem 1.35rem; font-size: 1rem; border-radius: 5px; border: 1px solid #222; background: #2c3e50; color: #fff; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" disabled>
					<span id="chapterDropdownLabel" style="flex:1; text-align:center;">Select a type first</span>
					<span style="margin-left:auto;">&#9662;</span>
				</button>
				<ul id="chapterDropdownList" style="display:none; position:absolute; top:110%; left:0; width:100%; background:#2c3e50; color:#fff; border:1px solid #222; border-radius:5px; box-shadow:0 2px 8px rgba(44,62,80,0.10); z-index:10; max-height:220px; overflow-y:auto; margin:0; padding:0; list-style:none;"></ul>
			</div>
			<button id="goButton" class="button-link" style="width: 200px;" disabled>Select</button>
		</div>
		<script>
		// --- Modular persistent checkmark dropdown ---
		const typeSelect = document.getElementById('typeSelect');
		const goButton = document.getElementById('goButton');
		const chapters = [
			{ value: '01', label: 'Chapter 1' },
			{ value: '02', label: 'Chapter 2' },
			{ value: '03', label: 'Chapter 3' },
			{ value: '04', label: 'Chapter 4' },
			{ value: '05', label: 'Chapter 5' },
			{ value: '06', label: 'Chapter 6' },
			{ value: '07', label: 'Chapter 7' },
			{ value: '08', label: 'Chapter 8' },
			{ value: '09', label: 'Chapter 9' },
			{ value: '10', label: 'Chapter 10' },
			{ value: '11', label: 'Chapter 11' },
			{ value: '12', label: 'Chapter 12' },
			{ value: '13', label: 'Chapter 13' },
			{ value: '14', label: 'Chapter 14' },
			{ value: '15', label: 'Chapter 15' },
			{ value: 'Addendum', label: 'Chapter Addendum' }
		];
		const chapterDropdownButton = document.getElementById('chapterDropdownButton');
		const chapterDropdownList = document.getElementById('chapterDropdownList');
		const chapterDropdownLabel = document.getElementById('chapterDropdownLabel');
		let selectedType = '';
		let selectedChapter = '';
		let dropdownOpen = false;
		// Utility for persistent check state
		function getCheckKey(type, chapter) {
			return `pdo-completed-${type}-${chapter}`;
		}
		function isChecked(type, chapter) {
			return localStorage.getItem(getCheckKey(type, chapter)) === '1';
		}
		function setChecked(type, chapter, checked) {
			localStorage.setItem(getCheckKey(type, chapter), checked ? '1' : '0');
		}
		function renderChapterDropdown() {
			chapterDropdownList.innerHTML = '';
			if (!selectedType) {
				chapterDropdownButton.disabled = true;
				chapterDropdownLabel.textContent = 'Select a type first';
				goButton.disabled = true;
				return;
			}
			chapterDropdownButton.disabled = false;
			chapterDropdownLabel.textContent = selectedChapter ? chapters.find(ch => ch.value === selectedChapter).label : '-- Select Chapter --';
			chapters.forEach(ch => {
				const li = document.createElement('li');
				li.style.display = 'flex';
				li.style.alignItems = 'center';
				li.style.padding = '0.5rem 1rem';
				li.style.cursor = 'pointer';
				li.style.borderBottom = '1px solid #222';
				if (ch === chapters[chapters.length-1]) li.style.borderBottom = 'none';
				// Checkmark box
				const box = document.createElement('span');
				box.style.display = 'inline-block';
				box.style.width = '1.1em';
				box.style.height = '1.1em';
				box.style.marginRight = '0.7em';
				box.style.border = '1.5px solid #fff';
				box.style.borderRadius = '3px';
				box.style.background = isChecked(selectedType, ch.value) ? '#4caf50' : 'transparent';
				box.style.transition = 'background 0.2s';
				box.innerHTML = isChecked(selectedType, ch.value) ? '<svg width="1em" height="1em" viewBox="0 0 16 16" fill="none" style="display:block;vertical-align:middle;margin:auto;" xmlns="http://www.w3.org/2000/svg"><path d="M4 8.5L7 11.5L12 5.5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>' : '';
				// Label
				const label = document.createElement('span');
				label.textContent = ch.label;
				label.style.flex = '1';
				// Click to select chapter
				li.addEventListener('click', e => {
				    if (e.target === box) return; // Don't select if clicking box
				    selectedChapter = ch.value;
				    localStorage.setItem('pdo-last-chapter', selectedChapter);
				    chapterDropdownLabel.textContent = ch.label;
				    goButton.disabled = false;
				    dropdownOpen = false;
				    chapterDropdownList.style.display = 'none';
				});
				// Click to toggle checkmark
				box.addEventListener('click', e => {
					e.stopPropagation();
					setChecked(selectedType, ch.value, !isChecked(selectedType, ch.value));
					renderChapterDropdown();
				});
				li.appendChild(box);
				li.appendChild(label);
				chapterDropdownList.appendChild(li);
			});
		}
		// Restore last selection from localStorage
		if (localStorage.getItem('pdo-last-type')) {
	    	selectedType = localStorage.getItem('pdo-last-type');
    		typeSelect.value = selectedType;
		}
		if (localStorage.getItem('pdo-last-chapter')) {
    		selectedChapter = localStorage.getItem('pdo-last-chapter');
		}
		typeSelect.addEventListener('change', () => {
	    	selectedType = typeSelect.value;
    		selectedChapter = '';
		    localStorage.setItem('pdo-last-type', selectedType);
		    localStorage.removeItem('pdo-last-chapter');
		    renderChapterDropdown();
		});
		chapterDropdownButton.addEventListener('click', () => {
			if (chapterDropdownButton.disabled) return;
			dropdownOpen = !dropdownOpen;
			chapterDropdownList.style.display = dropdownOpen ? 'block' : 'none';
		});
		document.addEventListener('click', e => {
			if (!chapterDropdownButton.contains(e.target) && !chapterDropdownList.contains(e.target)) {
				dropdownOpen = false;
				chapterDropdownList.style.display = 'none';
			}
		});
		goButton.addEventListener('click', (e) => {
			e.preventDefault();
			if (!selectedType || !selectedChapter) return;
			let file = '';
			if (selectedType === 'test') {
				file = selectedChapter === 'Addendum' ? 'Chapter_Addendum.html' : `Chapter_${selectedChapter}.html`;
			} else if (selectedType === 'quiz') {
				file = selectedChapter === 'Addendum' ? 'Chapter_Addendum_Quiz.html' : `Chapter_${selectedChapter}_Quiz.html`;
			}
			if (file) window.location.href = file;
		});
		// Initial render
		renderChapterDropdown();
		// If both restored, enable button
		if (selectedType && selectedChapter) {
			goButton.disabled = false;
		}
		// If both restored, enable button
		if (selectedType && selectedChapter) {
    		goButton.disabled = false;
		}
		</script>
</body>
</html>
